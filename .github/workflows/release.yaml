name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  goreleaser:
    runs-on: [self-hosted, macos, arm64]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: dashboard/pnpm-lock.yaml

      - name: Build dashboard (required for go:embed)
        run: cd dashboard && pnpm install --frozen-lockfile && pnpm run build

      - name: Install goreleaser
        run: |
          curl -fsSL -o /tmp/goreleaser.tar.gz "https://github.com/goreleaser/goreleaser/releases/latest/download/goreleaser_Darwin_arm64.tar.gz"
          sudo tar xzf /tmp/goreleaser.tar.gz -C /usr/local/bin goreleaser
          /usr/local/bin/goreleaser --version

      - name: Run goreleaser
        run: /usr/local/bin/goreleaser release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}

  docker-amd64:
    runs-on: [self-hosted, linux, x64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: dashboard/pnpm-lock.yaml

      - name: Build dashboard (required for go:embed)
        run: cd dashboard && pnpm install --frozen-lockfile && pnpm run build

      - name: Build binary
        run: CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o dist/elastic-fruit-runner-linux-amd64 ./cmd/elastic-fruit-runner

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: echo "tag=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Build and push amd64 image
        run: |
          docker build --provenance=false --platform linux/amd64 \
            -t ghcr.io/${{ github.repository }}:${{ steps.version.outputs.tag }}-amd64 \
            --build-arg TARGETARCH=amd64 .
          docker push ghcr.io/${{ github.repository }}:${{ steps.version.outputs.tag }}-amd64

  docker-arm64:
    runs-on: [self-hosted, linux, arm64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: dashboard/pnpm-lock.yaml

      - name: Build dashboard (required for go:embed)
        run: cd dashboard && pnpm install --frozen-lockfile && pnpm run build

      - name: Build binary
        run: CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -o dist/elastic-fruit-runner-linux-arm64 ./cmd/elastic-fruit-runner

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: echo "tag=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Build and push arm64 image
        run: |
          docker build --provenance=false --platform linux/arm64 \
            -t ghcr.io/${{ github.repository }}:${{ steps.version.outputs.tag }}-arm64 \
            --build-arg TARGETARCH=arm64 .
          docker push ghcr.io/${{ github.repository }}:${{ steps.version.outputs.tag }}-arm64

  docker-manifest:
    runs-on: [self-hosted, linux, x64]
    needs: [docker-amd64, docker-arm64]
    steps:
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: echo "tag=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Create and push manifest
        run: |
          docker manifest create ghcr.io/${{ github.repository }}:${{ steps.version.outputs.tag }} \
            ghcr.io/${{ github.repository }}:${{ steps.version.outputs.tag }}-amd64 \
            ghcr.io/${{ github.repository }}:${{ steps.version.outputs.tag }}-arm64
          docker manifest push ghcr.io/${{ github.repository }}:${{ steps.version.outputs.tag }}

          docker manifest create ghcr.io/${{ github.repository }}:latest \
            ghcr.io/${{ github.repository }}:${{ steps.version.outputs.tag }}-amd64 \
            ghcr.io/${{ github.repository }}:${{ steps.version.outputs.tag }}-arm64
          docker manifest push ghcr.io/${{ github.repository }}:latest
