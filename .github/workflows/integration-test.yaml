name: Integration Test

on:
  workflow_dispatch:

env:
  FASTFETCH_VERSION: "2.60.0"

jobs:
  test-macos-arm64:
    runs-on: [self-hosted, macOS, ARM64]
    steps:
      - name: fastfetch
        run: |
          curl -fsSL "https://github.com/fastfetch-cli/fastfetch/releases/download/${FASTFETCH_VERSION}/fastfetch-macos-aarch64.tar.gz" | tar xz
          ./fastfetch-macos-aarch64/usr/bin/fastfetch

  test-linux-arm64:
    runs-on: [self-hosted, Linux, ARM64]
    steps:
      - name: fastfetch
        run: |
          curl -fsSL "https://github.com/fastfetch-cli/fastfetch/releases/download/${FASTFETCH_VERSION}/fastfetch-linux-aarch64-polyfilled.tar.gz" | tar xz
          ./fastfetch-linux-aarch64-polyfilled/usr/bin/fastfetch

  test-linux-amd64:
    runs-on: [self-hosted, Linux, X64]
    steps:
      - name: fastfetch
        run: |
          curl -fsSL "https://github.com/fastfetch-cli/fastfetch/releases/download/${FASTFETCH_VERSION}/fastfetch-linux-amd64.tar.gz" | tar xz
          ./fastfetch-linux-amd64/usr/bin/fastfetch
