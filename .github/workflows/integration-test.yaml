name: Integration Test

on:
  workflow_dispatch:

jobs:
  test-macos-arm64:
    runs-on: [self-hosted, macOS, ARM64]
    steps:
      - name: Install and run neofetch
        run: |
          brew install --quiet neofetch 2>/dev/null || true
          neofetch

  test-linux-arm64:
    runs-on: [self-hosted, Linux, ARM64]
    steps:
      - name: Install and run neofetch
        run: |
          apt-get update -qq && apt-get install -y -qq neofetch > /dev/null 2>&1
          neofetch

  test-linux-amd64:
    runs-on: [self-hosted, Linux, X64]
    steps:
      - name: Install and run neofetch
        run: |
          apt-get update -qq && apt-get install -y -qq neofetch > /dev/null 2>&1
          neofetch
