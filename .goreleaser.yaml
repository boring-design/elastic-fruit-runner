version: 2

builds:
  - main: ./cmd/elastic-fruit-runner
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64

archives:
  - formats: ["tar.gz"]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}

checksum:
  name_template: checksums.txt

brews:
  - skip_upload: auto
    repository:
      owner: boring-design
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    homepage: https://github.com/boring-design/elastic-fruit-runner
    description: Elastic GitHub Actions self-hosted runner manager for Apple Silicon
    license: AGPL-3.0
    dependencies:
      - name: cirruslabs/cli/tart
      - name: sshpass
    install: |
      bin.install "elastic-fruit-runner"
    service: |
      run [opt_bin/"elastic-fruit-runner"]
      keep_alive true
      working_dir var/"elastic-fruit-runner"
      log_path var/"log/elastic-fruit-runner.log"
      error_log_path var/"log/elastic-fruit-runner.log"
      environment_variables PATH: std_service_path_env
    caveats: |
      For the Docker backend, install a Docker-compatible runtime separately
      (e.g. Docker Desktop, OrbStack, Colima).

      Before starting the service, create a config file:

        mkdir -p ~/.elastic-fruit-runner
        cat > ~/.elastic-fruit-runner/env << 'EOF'
        GITHUB_TOKEN=ghp_xxx
        GITHUB_CONFIG_URL=https://github.com/your-org
        EOF

      Then start (and auto-start on login):

        brew services start elastic-fruit-runner

      View logs:

        tail -f #{var}/log/elastic-fruit-runner.log

    post_install: |
      (var/"elastic-fruit-runner").mkpath

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^chore:"
      - "^test:"
